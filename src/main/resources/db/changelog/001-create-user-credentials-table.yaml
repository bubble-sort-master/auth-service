databaseChangeLog:
  - changeSet:
      id: 1
      author: gleb elopov
      changes:
        - createTable:
            tableName: user_credentials
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    check: "role IN ('USER', 'ADMIN')"
              - column:
                  name: created_at
                  type: DATE
                  defaultValueComputed: CURRENT_DATE
              - column:
                  name: updated_at
                  type: DATE
      rollback:
        - dropTable:
            tableName: user_credentials